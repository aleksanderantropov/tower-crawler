<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tower Crawler</title>
    <link href="./style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container">
      <canvas id="canvas"></canvas>
      <div>
        <h3>Hero:</h3>
        <ul class="stats" id="stats"></ul>
        <h3>Inventory:</h3>
        <ol class="inventory" id="inventory"></ol>
        <h3>Abilities:</h3>
        <ul class="abilities" id="abilities"></ul>
      </div>
      <div class="gameOver" id="gameOver">
        <div>
          <h3>Конец игры.</h3>
          <p>Вы погибли.</p>
        </div>

        <button id="restart">Начать снова</button>
      </div>
    </div>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
